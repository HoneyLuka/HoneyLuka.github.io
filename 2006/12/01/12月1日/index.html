    <h1 class="posttitle" itemprop="name headline">
        12月1日
    </h1>



    <div class="meta">
      <span class="author" itemprop="author" itemscope itemtype="http://schema.org/Person">
        <span itemprop="name">花园</span>
      </span>
      
    <div class="postdate">
      
        <time datetime="2006-12-01T10:05:02.000Z" itemprop="datePublished">2006-12-01</time>
        
      
    </div>


      
    <div class="article-category">
        <i class="fas fa-archive"></i>
        <a class="category-link" href="/categories/生活/">生活</a>
    </div>


      
    <div class="article-tag">

        <a class="tag-link" href="/tags/日常/">日常</a>
    </div>


    </div>

  <div class="content" itemprop="articleBody">
    <p>最近我爸爸突然开眼 说要给我买电脑了， 估计是我的冷战起到了效果了。 </p>
<p>电脑配置挺不错的，那以后我就不用来网吧玩了。省钱，不过…… 家里很冷… </p>
<p>珉姐被高数折磨的要死…… </p>
<p>找到个歌 昨天不知道怎么着了 发不上去 今天估计好了，大家来听听看怎么样哦。</p>

  </div>
</article>
